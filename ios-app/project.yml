name: PrepProIOS
options:
  bundleIdPrefix: com.preppro
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: ""
configs:
  Debug: debug
  Release: release
targets:
  PrepProIOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PrepProIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.preppro.ios
        INFOPLIST_KEY_CFBundleDisplayName: PrepPro
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: PrepPro needs local network access to connect to your Windows server.
        INFOPLIST_KEY_NSCameraUsageDescription: PrepPro needs camera access to scan QR codes for connecting to the Windows server.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
    scheme:
      testTargets: []
